      parameters:
      - name: id
        in: path
        description: id of the hook to delete
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '204':
          description: APIEmpty is an empty response
          content: {}
    patch:
      tags:
      - admin
      summary: Update a hook
      operationId: adminEditHook
      parameters:
      - name: id
        in: path
        description: id of the hook to update
        required: true
