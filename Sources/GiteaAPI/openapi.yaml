                items:
                  $ref: '#/components/schemas/Cron'
        '403':
          description: APIForbiddenError is a forbidden error response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
  /admin/cron/{task}:
