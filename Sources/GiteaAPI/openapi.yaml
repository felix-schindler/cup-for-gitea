          content: {}
  /admin/hooks:
    get:
      tags:
      - admin
      summary: List system's webhooks
      operationId: adminListHooks
      parameters:
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      - name: type
        in: query
        description: system, default or both kinds of webhooks
        schema:
          type: string
          default: system
          enum:
          - system
          - default
          - all
      responses:
        '200':
          description: HookList
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hook'
    post:
      tags:
      - admin
      summary: Create a hook
      operationId: adminCreateHook
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHookOption'
        required: true
      responses:
        '201':
          description: Hook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hook'
      x-codegen-request-body-name: body
  /admin/hooks/{id}:
    get:
