                type: string
            url:
              schema:
                type: string
          content: {}
        '422':
          description: APIValidationError is error format response related to input validation
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
    post:
      tags:
      - admin
      summary: Create a user
      operationId: adminCreateUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserOption'
        required: false
