      summary: Search all emails
      operationId: adminSearchEmails
      parameters:
      - name: q
        in: query
        description: keyword
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
