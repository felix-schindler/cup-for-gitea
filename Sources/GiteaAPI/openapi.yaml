openapi: 3.0.1
info:
  title: Gitea API
  description: This documentation describes the Gitea API.
  license:
    name: MIT
    url: http://opensource.org/licenses/MIT
  version: 1.26.1
servers:
- url: /api/v1
security:
- BasicAuth: []
- Token: []
- AccessToken: []
- AuthorizationHeaderToken: []
- SudoParam: []
- SudoHeader: []
- TOTPHeader: []
paths:
  /admin/actions/jobs:
    get:
      tags:
      - admin
      summary: Lists all jobs
      operationId: listAdminWorkflowJobs
      parameters:
      - name: status
        in: query
        description: workflow status (pending, queued, in_progress, failure, success, skipped)
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: WorkflowJobsList
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionWorkflowJobsResponse'
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
  /admin/actions/runners:
    get:
      tags:
      - admin
      summary: Get all runners
      operationId: getAdminRunners
      parameters:
      - name: disabled
        in: query
        description: filter by disabled status (true or false)
        schema:
          type: boolean
      responses:
        '200':
          description: RunnerList
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRunnersResponse'
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
  /admin/actions/runners/registration-token:
    post:
      tags:
      - admin
      summary: Get a global actions runner registration token
      operationId: adminCreateRunnerRegistrationToken
      responses:
        '200':
          description: RegistrationToken is response related to registration token
          headers:
            token:
              schema:
                type: string
          content: {}
  /admin/actions/runners/{runner_id}:
    get:
      tags:
      - admin
      summary: Get a global runner
      operationId: getAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Runner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRunner'
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
    delete:
      tags:
      - admin
      summary: Delete a global runner
      operationId: deleteAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      responses:
        '204':
          description: runner has been deleted
          content: {}
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
    patch:
      tags:
      - admin
      summary: Update a global runner
      operationId: updateAdminRunner
      parameters:
      - name: runner_id
        in: path
        description: id of the runner
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditActionRunnerOption'
        required: false
      responses:
        '200':
          description: Runner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionRunner'
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
        '422':
          description: APIValidationError is error format response related to input validation
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
      x-codegen-request-body-name: body
  /admin/actions/runs:
    get:
      tags:
      - admin
      summary: Lists all runs
      operationId: listAdminWorkflowRuns
      parameters:
      - name: event
        in: query
        description: workflow event name
        schema:
          type: string
      - name: branch
        in: query
        description: workflow branch
        schema:
          type: string
      - name: status
        in: query
        description: workflow status (pending, queued, in_progress, failure, success, skipped)
        schema:
          type: string
      - name: actor
        in: query
        description: triggered by user
        schema:
          type: string
      - name: head_sha
        in: query
        description: triggering sha of the workflow run
        schema:
          type: string
      - name: page
        in: query
        description: page number of results to return (1-based)
        schema:
          type: integer
      - name: limit
        in: query
        description: page size of results
        schema:
          type: integer
      responses:
        '200':
          description: WorkflowRunsList
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionWorkflowRunsResponse'
        '400':
          description: APIError is error format response
          headers:
            message:
              schema:
                type: string
            url:
              schema:
                type: string
          content: {}
        '404':
          description: APINotFound is a not found empty response
          content: {}
